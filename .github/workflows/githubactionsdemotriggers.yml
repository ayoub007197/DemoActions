name: GitHub Actions Demo Triggers

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/**

  pull_request:
    branches:
      - main

  schedule:
    - cron: '15 6 * * 0'

  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Display trigger information
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Repository: ${{ github.repository }}"
