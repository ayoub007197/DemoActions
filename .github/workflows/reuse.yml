name: Reuse other workflow

on:
  workflow_dispatch:

jobs:
  call-workflow:
    uses: ./.github/workflows/reusable.yml
    with:
      who-to-greet: Ayoub-Demo

  use-output:
    runs-on: ubuntu-latest
    needs: call-workflow
    steps:
      - name: Print output
        run: echo "The current time was ${{ needs.call-workflow.outputs.current-time }}"
